version: "3.9"

services:

  webapi:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ConnectionStrings__PostgreSQL=Host=postgres;Port=5432;Database=analytic-ai;Username=postgres;Password=postgres

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: analytic-ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_data: